<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作数据汇总</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <button id="sidebar-toggle" class="icon-btn" title="菜单">☰</button>
      <span class="header-title">工作数据汇总</span>
      <div class="header-right">
        <button id="refresh-btn" class="icon-btn" title="刷新数据">🔄</button>
        <button id="alert-bell" class="icon-btn" title="提醒">
          <span>🔔</span>
          <span id="alert-badge" class="badge hidden">0</span>
        </button>
        <span id="header-user"></span>
      </div>
    </header>
    <div id="app-body">
      <nav id="sidebar-nav">
        <a href="#/home" class="nav-item" data-route="home">
          <span class="nav-icon">🏠</span><span>首页</span>
        </a>
        <a href="#/contracts" class="nav-item" data-route="contracts">
          <span class="nav-icon">📋</span><span>合同目录</span>
        </a>
        <a href="#/energy" class="nav-item" data-route="energy">
          <span class="nav-icon">⚡</span><span>能耗信息</span>
        </a>
        <a href="#/property" class="nav-item" data-route="property">
          <span class="nav-icon">🏗️</span><span>支出统计</span>
        </a>
        <a href="#/equipment" class="nav-item" data-route="equipment">
          <span class="nav-icon">🔧</span><span>设备维修</span>
        </a>
        <a href="#/others" class="nav-item" data-route="others">
          <span class="nav-icon">📁</span><span>其他工作</span>
        </a>
        <a href="#/dashboard" class="nav-item" data-route="dashboard">
          <span class="nav-icon">📊</span><span>数据汇总</span>
        </a>
        <div class="nav-divider"></div>
        <a href="#/settings" class="nav-item" data-route="settings">
          <span class="nav-icon">⚙️</span><span>设置</span>
        </a>
      </nav>
      <main id="app-content"></main>
    </div>
    <nav id="mobile-nav">
      <a href="#/home" class="mnav-item"><span>🏠</span><span>首页</span></a>
      <a href="#/contracts" class="mnav-item"><span>📋</span><span>合同</span></a>
      <a href="#/energy" class="mnav-item"><span>⚡</span><span>能耗</span></a>
      <a href="#/dashboard" class="mnav-item"><span>📊</span><span>汇总</span></a>
      <button id="mnav-more" class="mnav-item"><span>⋯</span><span>更多</span></button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-container">
      <div id="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <div id="alert-drawer" class="hidden">
    <div class="alert-drawer-header">
      <span>提醒通知</span>
      <button id="alert-drawer-close" class="icon-btn">✕</button>
    </div>
    <div id="alert-drawer-body"></div>
  </div>

  <div id="mobile-more-menu" class="hidden">
    <div class="mobile-more-overlay"></div>
    <div class="mobile-more-panel">
      <a href="#/property">🏗️ 支出统计</a>
      <a href="#/equipment">🔧 设备维修</a>
      <a href="#/others">📁 其他工作</a>
      <a href="#/settings">⚙️ 设置</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
