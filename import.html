<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>数据导入</title>
<style>body{font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f1f5f9;margin:0}.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:32px;max-width:480px;text-align:center}h2{margin-bottom:8px}.info{color:#64748b;font-size:13px;margin-bottom:20px}.btn{padding:12px 32px;border-radius:6px;border:none;font-size:15px;cursor:pointer;font-weight:600}.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}.log{margin-top:16px;font-size:13px;text-align:left;max-height:200px;overflow-y:auto}.log .ok{color:#0d9488}.log .warn{color:#f59e0b}</style></head><body>
<div class="card">
  <h2>数据导入</h2>
  <p class="info">将 data/ 中的合同和能耗数据写入网站</p>
  <button class="btn btn-primary" onclick="doImport()">开始导入</button>
  <div id="log" class="log"></div>
</div>
<script>
const LOG = [];
function log(msg, cls) { LOG.push({msg,cls}); const d=document.getElementById('log'); d.innerHTML=LOG.map(l=>`<div class="${l.cls||''}">${l.msg}</div>`).join(''); }

async function doImport() {
  const btn = document.querySelector('.btn');
  btn.disabled = true; btn.textContent = '导入中...';
  try {
    log('正在加载数据文件...', '');
    const resp = await fetch('data/import-data.json');
    if (!resp.ok) throw new Error('无法加载 data/import-data.json');
    const json = await resp.json();
    const counts = [];
    if (json.data.contracts) counts.push(`${json.data.contracts.length} 条合同`);
    if (json.data.energy) counts.push(`${json.data.energy.length} 条能耗`);
    if (json.data.property) counts.push(`${json.data.property.length} 条物业支出`);
    if (json.data.equipment) counts.push(`${json.data.equipment.length} 条设备维修`);
    if (json.data.others) counts.push(`${json.data.others.length} 条其他工作`);
    log('读取到 ' + counts.join('、'), 'ok');

    for (const [key, val] of Object.entries(json.data)) {
      localStorage.setItem('myweb_' + key, JSON.stringify(val));
    }
    log('所有数据已写入，共 ' + counts.join('、'), 'ok');
    log('导入完成！2秒后跳转到首页...', '');
    setTimeout(() => { location.href = 'index.html'; }, 2000);
  } catch (e) {
    log('错误: ' + e.message, 'warn');
    btn.disabled = false; btn.textContent = '重试';
  }
}
</script></body></html>
